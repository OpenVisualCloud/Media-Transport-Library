[package]
name = "cpu-debug-ebpf"
version = "1.0.0"
edition = "2021"
description = "Native eBPF helper for cpu-debug-mcp"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"
nix = { version = "0.29", features = ["sched", "process"] }
anyhow = "1"

# eBPF support (optional — compile with --features ebpf)
[dependencies.libbpf-rs]
version = "0.24"
optional = true

[dependencies.plain]
version = "0.2"
optional = true

[features]
default = []
ebpf = ["libbpf-rs", "plain"]

[[bin]]
name = "cpu-debug-ebpf"
path = "src/main.rs"

[profile.release]
opt-level = 2
strip = true
