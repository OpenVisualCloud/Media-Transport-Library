[pytest]
log_file=pytest.log
cache_dir = /tmp/.pytest_cache_mtl
markers=
    smoke: mark test as part of the smoke test suite
    nightly: mark test as part of the nightly test suite
    dual: mark test as part of the dual host test suite
    verified: mark test as validated/expected to pass in CI
    ptp: mark test that uses internal PTP implementation (phc2sys will be disabled)
    performance: mark test as a performance benchmark (capacity sweep)
    base_performance: baseline performance subset (1080p 59fps)
    refactored: mark test as part of the refactored test suite (Application-based)
    original: mark test as part of the original (legacy) test suite
    allow_gapped_compliance: allow ST 2110-21 gapped (not narrow linear) video scheduling to pass EBU LIST compliance instead of failing
    tx_side: test validates a TX-side property (pacing, packing, transport format, on-wire cadence); EBU LIST compliance is meaningful here
    rx_side: test validates a purely RX-side property (RSS queue distribution, RX timing-parser analysis); EBU LIST compliance is not meaningful and must not be used
    tx_and_rx: test validates both a TX-side property (compliance) and an RX-side property (integrity/RX-only feature) together
