services:
  # Ubuntu 22.04 (no eBPF) — default
  imtl-ubuntu22:
    build:
      context: ..
      dockerfile: docker/ubuntu22.dockerfile
      target: final
      args:
        - HTTP_PROXY=${HTTP_PROXY:-${http_proxy:-}}
        - HTTPS_PROXY=${HTTPS_PROXY:-${https_proxy:-}}
    image: mtl:ubuntu22
    ulimits:
      memlock:
        soft: -1
        hard: -1
    devices:
      - "/dev/vfio:/dev/vfio"
    volumes:
      - "/var/run/imtl:/var/run/imtl"
    cap_add:
      - SYS_NICE
      - IPC_LOCK

  # Ubuntu 24.04 (with eBPF/XDP)
  imtl-ubuntu24:
    build:
      context: ..
      dockerfile: docker/ubuntu24.dockerfile
      target: final
      args:
        - HTTP_PROXY=${HTTP_PROXY:-${http_proxy:-}}
        - HTTPS_PROXY=${HTTPS_PROXY:-${https_proxy:-}}
    image: mtl:ubuntu24
    ulimits:
      memlock:
        soft: -1
        hard: -1
    devices:
      - "/dev/vfio:/dev/vfio"
    volumes:
      - "/var/run/imtl:/var/run/imtl"
    # network_mode: host  # For AF_XDP backend
    cap_add:
      - SYS_NICE
      - IPC_LOCK
      - NET_RAW
      - CAP_BPF

  # Rocky Linux 9 (with eBPF/XDP)
  imtl-rocky:
    build:
      context: ..
      dockerfile: docker/rocky9.dockerfile
      target: final
      args:
        - HTTP_PROXY=${HTTP_PROXY:-${http_proxy:-}}
        - HTTPS_PROXY=${HTTPS_PROXY:-${https_proxy:-}}
    image: mtl:rocky9
    ulimits:
      memlock:
        soft: -1
        hard: -1
    devices:
      - "/dev/vfio:/dev/vfio"
    volumes:
      - "/var/run/imtl:/var/run/imtl"
    # network_mode: host  # For AF_XDP backend
    cap_add:
      - SYS_NICE
      - IPC_LOCK
      - NET_RAW
      - CAP_BPF