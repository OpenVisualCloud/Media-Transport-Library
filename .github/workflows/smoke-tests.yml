name: smoke-tests-bare-metal
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'maint-**'
  pull_request:
    branches:
      - main
      - 'maint-**'
permissions:
  contents: read
  checks: read
  actions: read
jobs:
  smoke-check-for-changes:
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: read
    outputs:
      changed: ${{ steps.filter.outputs.linux_tests == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: .github/path_filters.yml
  build:
    needs: smoke-check-for-changes
    if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Wait for Build workflow
        uses: ./.github/actions/wait-for-workflow
        with:
          check_name: build
  run-smoke-tests:
    needs:
      - smoke-check-for-changes
      - build
    concurrency:
      group: smoke-${{ github.workflow }}-${{ github.ref }}-${{ matrix.nic }}
      cancel-in-progress: true
    strategy:
      matrix:
        nic:
          - e810
          - e830
          - e835
      fail-fast: false
    runs-on: ${{ matrix.nic }}
    timeout-minutes: 90
    steps:
      - name: 'preparation: Harden Runner'
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: 'preparation: Checkout MTL'
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        uses: OpenVisualCloud/Media-Transport-Library/.github/actions/checkout-clean@main
        with:
          ref: '${{ github.ref }}'
      - name: 'preparation: Validate host and download artifacts'
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        uses: ./.github/actions/validate-host

      - name: 'cleanup: Kill stale processes before test'
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        uses: ./.github/actions/cleanup

      - name: 'installation: Install pipenv environment'
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        working-directory: tests/validation
        id: pipenv-install
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Create session ID
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        run: |
          runner_name=${{ runner.name }}
          echo "SESSION_ID=${runner_name##*-}" >> "$GITHUB_ENV"
      - name: Set PCI device env variable
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        run: |
          if [ "${{ matrix.nic }}" = "e810" ]; then
            echo "PCI_DEVICE=8086:1592,8086:1592" >> "$GITHUB_ENV"
          elif [ "${{ matrix.nic }}" = "e830" ]; then
            echo "PCI_DEVICE=8086:12d2,8086:12d2" >> "$GITHUB_ENV"
          elif [ "${{ matrix.nic }}" = "e825" ]; then
            echo "PCI_DEVICE=8086:579d,8086:579d" >> "$GITHUB_ENV"
          elif [ "${{ matrix.nic }}" = "e835" ]; then
            echo "PCI_DEVICE=8086:1249,8086:1249" >> "$GITHUB_ENV"
          fi
      - name: Generate test framework config files
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        working-directory: tests/validation/configs
        run: |
          python3 gen_config.py \
            --session_id ${{ env.SESSION_ID }} \
            --mtl_path ${{ secrets.RUNNER_MTL_PATH }} \
            --pci_device ${{ env.PCI_DEVICE }} \
            --ip_address 127.0.0.1 \
            --username ${{ secrets.RUNNER_USERNAME }} \
            --key_path "/home/$USER/.ssh/id_ed25519" \
            --ebu_ip ${{ secrets.RUNNER_EBU_LIST_IP }} \
            --ebu_user ${{ secrets.RUNNER_EBU_LIST_USER }} \
            --ebu_password ${{ secrets.RUNNER_EBU_LIST_PASSWORD }}
      - name: Export workflow tag for PCAP naming
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        shell: bash
        run: |
          echo "MTL_GITHUB_WORKFLOW=${{ github.workflow }}:${{ matrix.nic }}" >> "$GITHUB_ENV"
      - name: 'execution: Run validation-bare-metal tests in virtual environment'
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        timeout-minutes: 60
        run: |
          tests/validation/.venv/bin/python3 -m pytest --topology_config=tests/validation/configs/topology_config.yaml --test_config=tests/validation/configs/test_config.yaml -m smoke -x --template=html/index.html --report=report.html
      - name: "upload report"
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        id: upload-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-test-report-${{ matrix.nic }}
          path: |
            report.html
      - name: "Add report to summary"
        if: ${{ needs.smoke-check-for-changes.outputs.changed == 'true' && github.repository == 'OpenVisualCloud/Media-Transport-Library' }}
        run: |
          {
            echo "## Smoke Tests Report"
            echo ""
            # Check if JSON report exists
            if [ -f "report.json" ]; then
              # Parse JSON report
                PASSED=$(jq '.summary.passed // 0' report.json)
                FAILED=$(jq '.summary.failed // 0' report.json)
                SKIPPED=$(jq '.summary.skipped // 0' report.json)
                ERROR=$(jq '.summary.errors // 0' report.json)
              # Add summary stats
              echo "| Status | Count |"
              echo "| ------ | ----- |"
              echo "| ✅ Passed | ${PASSED:-0} |"
              echo "| ❌ Failed | ${FAILED:-0} |"
              echo "| ⚠️ Error | ${ERROR:-0} |"
              echo "| ⏭️ Skipped | ${SKIPPED:-0} |"
              echo ""
              # Add test result details if available
              TOTAL=$((${PASSED:-0} + ${FAILED:-0} + ${ERROR:-0} + ${SKIPPED:-0}))
              echo "**Total Tests:** $TOTAL"
              echo ""
              if [ "${FAILED:-0}" -gt 0 ] || [ "${ERROR:-0}" -gt 0 ]; then
                echo "❌ **Some tests failed!** Please check the detailed report."
              else
                echo "✅ **All tests passed!**"
              fi
              echo ""
              # Add link to full report artifact
              echo "📄 [Download Full HTML Report](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${{ steps.upload-report.outputs.artifact-id }})"
            else
              echo "❌ No report.json file was generated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 'cleanup: Kill test processes'
        if: always()
        uses: ./.github/actions/cleanup
