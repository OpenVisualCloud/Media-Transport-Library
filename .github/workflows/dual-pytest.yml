name: dual-pytest
on:
  workflow_dispatch:
jobs:
  run-pytest:
    runs-on: perf
    timeout-minutes: 720
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Checkout MTL
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Build MTL (on both runners)
        uses: ./.github/actions/build
        with:
          remote_host: ${{ secrets.RUNNER_USERNAME }}@${{ secrets.PERF_CLIENT_IP }}
          remote_mtl_path: ${{ secrets.RUNNER_MTL_PATH }}
          remote_branch: ${{ github.ref_name }}
      - name: Install Python dependencies
        working-directory: ./tests/validation
        run: |
          python3 -m venv .venv
          ./.venv/bin/pip install -r ./requirements.txt
      - name: Create topology config
        working-directory: ./tests/validation/configs
        run: |
          tee ./topology_config.yaml << EOF
          ---
          metadata:
            version: '2.4'
          hosts:
            - name: host-0
              instantiate: true
              role: sut
              network_interfaces:
                - pci_device: 8086:12d2
                  interface_index: 0
              connections:
                - ip_address: 127.0.0.1
                  connection_type: SSHConnection
                  connection_options:
                    port: 22
                    username: ${{ secrets.RUNNER_USERNAME }}
                    password: None
                    key_path: /home/$USER/.ssh/id_ed25519
            - name: host-1-remote
              instantiate: true
              role: sut
              network_interfaces:
                - pci_device: 8086:12d2
                  interface_index: 0
              connections:
                - ip_address: ${{ secrets.PERF_CLIENT_IP }}
                  connection_type: SSHConnection
                  connection_options:
                    port: 22
                    username: ${{ secrets.RUNNER_USERNAME }}
                    password: None
                    key_path: /home/$USER/.ssh/id_ed25519
          EOF
      - name: Set session ID
        run: |
          runner_name="${{ runner.name }}"
          echo "SESSION_ID=${runner_name##*-}" >> "$GITHUB_ENV"
      - name: Create test config
        working-directory: ./tests/validation/configs
        run: |
          tee ./test_config.yaml << EOF
          session_id: ${{ env.SESSION_ID }}
          mtl_path: ${{ secrets.RUNNER_MTL_PATH }}
          media_path: /mnt/media
          ramdisk:
            media:
              mountpoint: /mnt/ramdisk/media
              size_gib: 32
            pcap:
              mountpoint: /mnt/ramdisk/pcap
              size_gib: 768
          compliance: false
          capture_cfg:
            enable: false
            pcap_dir: /mnt/ramdisk/pcap
          ebu_server:
            ebu_ip: ${{ secrets.EBU_SERVER_IP }}
            user: ${{ secrets.EBU_SERVER_USER }}
            password: ${{ secrets.EBU_SERVER_PASSWORD }}
            proxy: false
          interface_type: VF
          EOF
      - name: Set workflow tag for PCAP naming
        run: |
          echo "MTL_GITHUB_WORKFLOW=${{ github.workflow }}:e830" >> "$GITHUB_ENV"
      - name: Start MtlManager
        run: |
          sudo MtlManager &
      - name: Run pytest
        working-directory: ./tests/validation
        run: |
          ./.venv/bin/pytest \
            --test_config=./configs/test_config.yaml \
            --topology_config=./configs/topology_config.yaml \
            -m dual \
            --template=html/index.html \
            --report=./report.html \
            ./tests
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dual-test-report
          path: ./tests/validation/report.html
