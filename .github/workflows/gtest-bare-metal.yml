name: gtest-bare-metal

on:
  # allow manually trigger
  workflow_dispatch:
    inputs:
      branch-to-checkout:
        type: string
        default: 'main'
        required: false
        description: 'Branch name to use'
  push:
    branches:
      - main
      - 'maint-**'
  pull_request:
    branches:
      - main
      - 'maint-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: read
  actions: read

jobs:
  gtest-check-for-changes:
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: read
    outputs:
      changed: ${{ steps.filter.outputs.linux_tests == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Clean workspace and checkout
        uses: OpenVisualCloud/Media-Transport-Library/.github/actions/checkout-clean@main

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: .github/path_filters.yml

  build:
    needs: gtest-check-for-changes
    if: ${{ needs.gtest-check-for-changes.outputs.changed == 'true' && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Wait for Build workflow
        uses: ./.github/actions/wait-for-workflow
        with:
          check_name: build

  run-gtest-tests:
    needs:
      - gtest-check-for-changes
      - build
    if: ${{ github.repository == 'OpenVisualCloud/Media-Transport-Library' && needs.gtest-check-for-changes.outputs.changed == 'true' && github.event_name != 'workflow_dispatch' }}
    strategy:
      matrix:
        nic:
          - e810
          - e830
      fail-fast: false
    runs-on: ${{ matrix.nic }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout MTL
        uses: OpenVisualCloud/Media-Transport-Library/.github/actions/checkout-clean@main
        with:
          ref: '${{ inputs.branch-to-checkout || github.sha || github.ref }}'

      - name: Validate host and download artifacts
        uses: ./.github/actions/validate-host

      - name: Check and build ice driver if needed
        run: |
          if ! sudo modinfo ice | grep -Ei '^version:[[:space:]]*Kahawai_'; then ./script/build_ice_driver.sh; fi

      - name: 'cleanup: Kill stale processes before test'
        uses: ./.github/actions/cleanup

      - name: Run gtest bare metal
        env:
          NIGHTLY: 0
          EXIT_ON_FAILURE: 1
        run: sudo -E "${{ github.workspace }}/.github/scripts/gtest.sh"

      - name: 'cleanup: Kill test processes'
        if: always()
        uses: ./.github/actions/cleanup
