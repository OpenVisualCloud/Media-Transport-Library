name: perf-pytest
on:
  workflow_dispatch:
    inputs:
      branch:
        description: MTL branch to build and test (defaults to workflow branch)
        required: false
        type: string
      marker:
        description: 'Pytest marker filter (-m), e.g. performance'
        required: false
        type: string
      test_filter:
        description: 'Pytest keyword filter (-k), e.g. test_rx[multi_core-59fps-1080p-dma]'
        required: false
        type: string
        default: '1080p and 59fps'
      num_sessions:
        description: Fixed session count (skip binary search)
        required: false
        type: string
      sch_quota:
        description: Scheduler session quota override
        required: false
        type: string
      test_time:
        description: Test duration in seconds
        required: false
        type: string
        default: '120'
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: read

jobs:
  run-perf-tests:
    runs-on: [self-hosted, perf, sut]
    timeout-minutes: 720
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Set current date
        run: echo "CURRENT_DATE=$(date '+%y%m%d-%H%M%S')" >> "$GITHUB_ENV"
      - name: Checkout MTL
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: '${{ inputs.branch || github.ref }}'
          fetch-depth: 0
      - name: Overlay test framework from workflow branch
        if: inputs.branch != ''
        run: |
          echo "MTL source: ${{ inputs.branch }}"
          echo "Test framework: ${{ github.sha }} (${{ github.ref_name }})"
          git checkout ${{ github.sha }} -- tests/validation/ .github/
      - uses: ./.github/actions/build
        with:
          remote_host: '${{ secrets.RUNNER_USERNAME }}@${{ secrets.PERF_CLIENT_IP }}'
          remote_mtl_path: '${{ secrets.PERF_CLIENT_MTL_PATH }}'
          remote_branch: '${{ inputs.branch || github.ref_name }}'
      - name: Install pytest dependencies
        working-directory: ./tests/validation
        run: |
          python3 -m venv ./.venv
          source ./.venv/bin/activate
          pip install -r ./requirements.txt
      - name: Set session ID
        run: |
          runner_name="${{ runner.name }}"
          echo "SESSION_ID=${runner_name##*-}" >> "$GITHUB_ENV"
      - name: Set PCI device
        run: echo "PCI_DEVICE=${{ secrets.PERF_PCI_DEVICE || '8086:12d2,8086:12d2' }}" >> "$GITHUB_ENV"
      - name: Generate pytest configuration files
        working-directory: ./tests/validation/configs
        run: |
          source ../.venv/bin/activate
          python3 gen_config.py \
            --session_id "${{ env.SESSION_ID }}" \
            --mtl_path "${{ secrets.PERF_CLIENT_MTL_PATH }}" "${{ secrets.RUNNER_MTL_PATH }}" \
            --pci_device "${{ env.PCI_DEVICE }}" "${{ env.PCI_DEVICE }}" \
            --ip_address "${{ secrets.PERF_CLIENT_IP }}" "${{ secrets.PERF_SUT_IP }}" \
            --username "${{ secrets.RUNNER_USERNAME }}" \
            --key_path "/home/$USER/.ssh/id_ed25519" \
            --test_time "${{ inputs.test_time || '120' }}" \
            --no_capture
      - name: Export workflow tag for PCAP naming
        run: echo "MTL_GITHUB_WORKFLOW=${{ github.workflow }}" >> "$GITHUB_ENV"
      - name: Start MtlManager
        run: sudo MtlManager &
      - name: Run performance tests
        working-directory: ./tests/validation
        run: |
          ./.venv/bin/python3 -m pytest \
            --test_config=./configs/test_config.yaml \
            --topology_config=./configs/topology_config.yaml \
            ${{ inputs.marker && format('-m "{0}"', inputs.marker) || '' }} \
            -k "${{ inputs.test_filter || '1080p and 59fps' }}" \
            --template=html/index.html \
            --report=./report.html \
            ${{ inputs.num_sessions && format('--num_sessions {0}', inputs.num_sessions) || '' }} \
            ${{ inputs.sch_quota && format('--sch_quota {0}', inputs.sch_quota) || '' }} \
            "./tests/dual/performance"
      - name: Generate performance report
        if: always()
        working-directory: ./tests/validation
        run: |
          if [ -d logs/performance ]; then
            ./.venv/bin/python3 common/generate_report.py \
              logs/performance -o performance_report.html \
              || echo "::warning::Performance report generation failed"
          else
            echo "::warning::No performance logs found — skipping report generation"
          fi
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "perf-test-report-${{ runner.name }}-${{ env.CURRENT_DATE }}"
          path: |
            ./tests/validation/report.html
            ./tests/validation/performance_report.html
      - name: Clean up
        if: always()
        run: |
          sudo pkill -f MtlManager || true
          sudo rm -rf tests/validation/logs
